# cipheator client configuration
server_host=127.0.0.1
server_port=7443

# TLS
ca_file=/Users/ghostmelon/Desktop/Cipheator/server.crt
client_cert=
client_key=
verify_peer=true
enroll_port=7445
enroll_token=

# behavior
default_key_storage=server
# Clipboard limit during secure mode (0 = block all clipboard data)
clipboard_max_bytes=800
# Decrypt to temp file (auto-clean on terminate)
decrypt_to_temp=false
# Demo mode (UI banner + defaults)
demo_mode=false
last_policy_version=1
