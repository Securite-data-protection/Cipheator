# cipheator server configuration
listen_host=0.0.0.0
listen_port=7443

# admin API (TLS)
admin_host=0.0.0.0
admin_port=7444
admin_token=CHANGE_ME

# TLS
cert_file=/Users/ghostmelon/Desktop/Cipheator/server.crt
key_file=/Users/ghostmelon/Desktop/Cipheator/server.key
ca_file=
require_client_cert=false

# storage
storage_dir=storage

# GOST CLI
enc_magma=/home/server/Cipheator/encoder
dec_magma=/home/server/Cipheator/decoder
enc_kuznechik=/home/server/Cipheator/encoder
dec_kuznechik=/home/server/Cipheator/decoder

gost_enc_suffix=.enc
gost_key_suffix=.key

# protocol limits
max_header_bytes=65536
max_file_bytes=104857600

# anomaly detection
anomaly_failed_login_threshold=3
anomaly_failed_login_window_sec=600
anomaly_bulk_files_threshold=20
anomaly_bulk_files_window_sec=300
anomaly_time_min_samples=5
anomaly_time_hour_fraction=0.2
anomaly_alert_cooldown_sec=600
# Optional fixed working hours (0-23). Set both to enable.
# Example: 8-20 means any login outside 08:00-20:59 is suspicious.
anomaly_work_hours_start=-1
anomaly_work_hours_end=-1

# Optional lockouts (seconds). 0 disables blocking (alerts only).
anomaly_failed_login_lock_sec=0
anomaly_bulk_files_lock_sec=0
anomaly_time_lock_sec=0

# Decrypt anomaly detection
anomaly_decrypt_burst_threshold=20
anomaly_decrypt_burst_window_sec=60
anomaly_decrypt_volume_threshold_mb=256
anomaly_decrypt_volume_window_sec=300
anomaly_profile_min_decrypt_samples=20
anomaly_profile_decrypt_rate_factor=3.0
anomaly_profile_decrypt_bytes_factor=4.0

# Hard client binding policy (default OFF)
client_binding_enabled=false
